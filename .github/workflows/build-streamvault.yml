name: Build StreamVault Tizen WGT
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  TIZEN_STUDIO_VER: 5.5

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout this repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Install required packages
      - name: Install required packages
        run: sudo apt install expect

      # 4. Download Tizen Studio
      - name: Download Tizen Studio
        run: |
          curl -o tizen-installer "https://download.tizen.org/sdk/Installer/tizen-studio_${TIZEN_STUDIO_VER}/web-cli_Tizen_Studio_${TIZEN_STUDIO_VER}_ubuntu-64.bin"

      # 5. Install Tizen Studio
      - name: Install Tizen Studio
        run: |
          chmod +x tizen-installer
          ./tizen-installer --accept-license "${GITHUB_WORKSPACE}/tizen-studio"
          rm ./tizen-installer

      # 6. Create Tizen Certificate
      - name: Create Tizen Certificate
        run: |
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen certificate -a StreamVault -p 1234 -c US -s California -ct SanFrancisco -o StreamVault -n StreamVault -e streamvault@example.org -f streamvault
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen security-profiles add -n StreamVault -a "${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/streamvault.p12" -p 1234
          ${GITHUB_WORKSPACE}/tizen-studio/tools/ide/bin/tizen cli-config "profiles.path=${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml"

      # 7. Install dependencies
      - name: Install dependencies
        run: npm ci --no-audit

      # 8. Build the web app (Vite -> dist/)
      - name: Build StreamVault
        run: npm run build

      # 9. Sanity check the build output
      - name: Verify build output
        run: |
          test -f dist/config.xml || { echo "::error::dist/config.xml missing â€” public/config.xml did not make it into the build."; exit 1; }
          test -f dist/index.html || { echo "::error::dist/index.html missing."; exit 1; }
          ls -la dist

      # 10. Prepare for signing
      - name: Prepare for signing
        run: |
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/keystore/author/streamvault.pwd|1234|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i "s|${GITHUB_WORKSPACE}/tizen-studio-data/tools/certificate-generator/certificates/distributor/tizen-distributor-signer.pwd|tizenpkcs12passfordsigner|g" ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml
          sed -i 's|password=""|password="tizenpkcs12passfordsigner"|g' ${GITHUB_WORKSPACE}/tizen-studio-data/profile/profiles.xml

      # 11. Create expect script for packaging
      - name: Create expect script
        run: |
          cat > package.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 300
          spawn $env(GITHUB_WORKSPACE)/tizen-studio/tools/ide/bin/tizen package -t wgt -s StreamVault -- $env(GITHUB_WORKSPACE)/dist
          expect {
            "Author password:" {
              send "1234\r"
              exp_continue
            }
            "Save author password" {
              send "n\r"
              exp_continue
            }
            "Distributor1 password:" {
              send "tizenpkcs12passfordsigner\r"
              exp_continue
            }
            "Save distributor1 password" {
              send "n\r"
              exp_continue
            }
            eof
          }
          EOF
          chmod +x package.exp

      # 12. Package WGT
      - name: Package WGT
        run: |
          ./package.exp
          WGT="$(find dist -maxdepth 1 -name '*.wgt' | head -n1)"
          if [ -z "$WGT" ]; then
            echo "::error::No .wgt produced in dist/."
            exit 1
          fi
          mkdir -p release
          mv "$WGT" release/StreamVault.wgt
          ls -la release

      # 13. Get version and date
      - name: Get version info
        id: version
        run: |
          VERSION="$(grep -A2 '<widget' dist/config.xml | grep -o 'version="[^"]*"' | head -n1 | sed -E 's/version="([^"]*)"/\1/')"
          [ -z "$VERSION" ] && VERSION="1.0.0"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date_tag=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT
          echo "date_pretty=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      # 14. Create Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: 'v${{ steps.version.outputs.version }}-${{ steps.version.outputs.date_tag }}'
          name: 'StreamVault Tizen v${{ steps.version.outputs.version }} - ${{ steps.version.outputs.date_pretty }}'
          files: release/*.wgt
          body: |
            # StreamVault Tizen WGT

            Built on ${{ steps.version.outputs.date_pretty }} from `${{ github.sha }}`.

            ## Installation
            1. Enable Developer Mode on your Samsung TV.
            2. Sideload the `.wgt` via [Apps2Samsung](https://github.com/Apps2Samsung/Samsung-TV-App-Installer/releases/latest), Tizen Studio, or `sdb install StreamVault.wgt`.

            See the [README](https://github.com/${{ github.repository }}) for details.
          draft: false
          prerelease: false